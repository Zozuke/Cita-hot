<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.container {
  width: 350px;
  height: 600px;
  background: #1e293b;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  background: #2563eb;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* CHAT */
.chat-box {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

/* MENSAJES */
.msg {
  margin: 5px 0;
  padding: 8px 12px;
  border-radius: 12px;
  max-width: 70%;
}

.otros {
  background: #334155;
}

.mio {
  background: #2563eb;
  margin-left: auto;
}

/* INPUT */
.input-box {
  display: flex;
  padding: 10px;
  background: #0f172a;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

/* LOGIN */
#login {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
</style>

</head>
<body>

<div class="container">

  <div id="login">
    <input id="nombreInput" placeholder="Tu nombre">
    <button onclick="guardarNombre()">Entrar</button>
  </div>

  <div id="chat" style="display:none; flex-direction: column; height:100%;">
    <div class="header" id="usuario"></div>

    <div class="chat-box" id="lista"></div>

    <div class="input-box">
      <input id="mensajeInput" placeholder="Escribe mensaje">
      <button onclick="enviar()">➤</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
  "https://kjbesbtvgmtuffgmzaaw.supabase.co",
  "sb_publishable_xbe-EzT66Ww36li0dM9iVw_5zHWyBTZ"
);

let nombreUsuario = localStorage.getItem("nombre");

if(nombreUsuario){
  iniciarChat();
}

function guardarNombre(){
  const nombre = document.getElementById("nombreInput").value;
  localStorage.setItem("nombre", nombre);
  iniciarChat();
}

function iniciarChat(){
  nombreUsuario = localStorage.getItem("nombre");

  document.getElementById("login").style.display = "none";
  document.getElementById("chat").style.display = "flex";
  document.getElementById("usuario").textContent = nombreUsuario;

  cargar();
}

async function enviar(){
  const mensaje = document.getElementById("mensajeInput").value;

  if(!mensaje) return;

  await supabase.from("chat").insert([
    { nombre: nombreUsuario, mensaje: mensaje }
  ]);

  document.getElementById("mensajeInput").value = "";
  cargar();
}

async function cargar(){
  const { data } = await supabase
    .from("chat")
    .select("*")
    .order("id", { ascending: true });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(d => {
    const div = document.createElement("div");
    div.classList.add("msg");

    if(d.nombre === nombreUsuario){
      div.classList.add("mio");
    } else {
      div.classList.add("otros");
    }

    div.textContent = d.nombre + ": " + d.mensaje;
    lista.appendChild(div);
  });

  lista.scrollTop = lista.scrollHeight;
}

setInterval(cargar, 2000);
</script>

</body>
</html>
